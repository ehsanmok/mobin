# Production compose: backend only (no Nginx, no Locust).
# The backend serves embedded HTML from static.mojo directly.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Reverse-proxy this with Caddy/Nginx/Traefik on the host for TLS.

services:
  backend:
    build:
      context: .          # repo root — Dockerfile is at root
      dockerfile: Dockerfile
    image: mobin-backend:latest
    container_name: mobin-backend-prod
    restart: always
    # ── NOTE ────────────────────────────────────────────────────────────────
    # No ports are exposed here intentionally.  All traffic flows through the
    # Caddy service (ports 80/443) which reverse-proxies to this container
    # over the internal Docker network.  If you need direct backend access for
    # debugging, temporarily add `ports: ["8080:8080", "8081:8081"]`.
    # ────────────────────────────────────────────────────────────────────────
    expose:
      - "8080"
      - "8081"
    environment:
      PORT:     "8080"
      WS_PORT:  "8081"
      DB_PATH:  "/app/data/mobin.db"
      TTL_SECS: "2592000"
      MAX_SIZE: "65536"
      # ── Litestream (optional) ────────────────────────────────────────────
      # Uncomment and fill in to enable continuous SQLite replication.
      # See backend/litestream.yml for supported URL schemes and examples.
      #
      # Cloudflare R2 (free 10 GB, no egress):
      #   LITESTREAM_REPLICA_URL: "s3://mobin-backup/mobin.db?endpoint=https://<id>.r2.cloudflarestorage.com"
      #   LITESTREAM_ACCESS_KEY_ID: "<r2-access-key>"
      #   LITESTREAM_SECRET_ACCESS_KEY: "<r2-secret>"
      #
      # AWS S3:
      #   LITESTREAM_REPLICA_URL: "s3://my-bucket/mobin.db"
      #   AWS_ACCESS_KEY_ID: "<key>"
      #   AWS_SECRET_ACCESS_KEY: "<secret>"
      #   AWS_REGION: "us-east-1"
    volumes:
      - mobin-data:/app/data   # persistent SQLite WAL database
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "256M"   # pre-compiled binary; no JIT overhead

  # ── Caddy reverse proxy (TLS + security headers) ──────────────────────────
  # Caddy terminates TLS automatically via Let's Encrypt when CADDY_DOMAIN is
  # set to a real hostname.  For local testing leave CADDY_DOMAIN as ":80"
  # (plain HTTP, no cert needed).
  caddy:
    image: caddy:2-alpine
    container_name: mobin-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      # Local test  → ":80"  (plain HTTP, no TLS)
      # Production  → "mobin.yourdomain.com"  (auto TLS via Let's Encrypt)
      CADDY_DOMAIN: "${CADDY_DOMAIN:-:80}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mobin-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
