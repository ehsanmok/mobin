# Production compose: backend only (no Nginx, no Locust).
# The backend serves embedded HTML from static.mojo directly.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Reverse-proxy this with Caddy/Nginx/Traefik on the host for TLS.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mobin-backend:latest
    container_name: mobin-backend-prod
    restart: always
    ports:
      - "8080:8080"   # HTTP REST API + embedded frontend
      - "8081:8081"   # WebSocket live feed
    environment:
      PORT:     "8080"
      WS_PORT:  "8081"
      DB_PATH:  "/app/data/mobin.db"
      TTL_DAYS: "30"
      MAX_SIZE: "65536"
    volumes:
      - mobin-data:/app/data   # persistent SQLite WAL database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"   # Mojo JIT needs headroom at startup

volumes:
  mobin-data:
    driver: local
