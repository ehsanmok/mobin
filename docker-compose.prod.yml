# Production compose: backend only (no Nginx, no Locust).
# The backend serves embedded HTML from static.mojo directly.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Reverse-proxy this with Caddy/Nginx/Traefik on the host for TLS.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mobin-backend:latest
    container_name: mobin-backend-prod
    restart: always
    ports:
      - "8080:8080"   # HTTP REST API + embedded frontend
      - "8081:8081"   # WebSocket live feed
    environment:
      PORT:     "8080"
      WS_PORT:  "8081"
      DB_PATH:  "/app/data/mobin.db"
      TTL_DAYS: "30"
      MAX_SIZE: "65536"
      # ── Litestream (optional) ────────────────────────────────────────────
      # Uncomment and fill in to enable continuous SQLite replication.
      # See backend/litestream.yml for supported URL schemes and examples.
      #
      # Cloudflare R2 (free 10 GB, no egress):
      #   LITESTREAM_REPLICA_URL: "s3://mobin-backup/mobin.db?endpoint=https://<id>.r2.cloudflarestorage.com"
      #   LITESTREAM_ACCESS_KEY_ID: "<r2-access-key>"
      #   LITESTREAM_SECRET_ACCESS_KEY: "<r2-secret>"
      #
      # AWS S3:
      #   LITESTREAM_REPLICA_URL: "s3://my-bucket/mobin.db"
      #   AWS_ACCESS_KEY_ID: "<key>"
      #   AWS_SECRET_ACCESS_KEY: "<secret>"
      #   AWS_REGION: "us-east-1"
    volumes:
      - mobin-data:/app/data   # persistent SQLite WAL database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"   # Mojo JIT needs headroom at startup

  # ── Caddy reverse proxy (TLS + security headers) ──────────────────────────
  # Caddy terminates TLS automatically via Let's Encrypt.
  # Edit Caddyfile to set your domain and (optionally) enable rate limiting.
  caddy:
    image: caddy:2-alpine
    container_name: mobin-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mobin-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
