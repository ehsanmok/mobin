# fly.toml app configuration file generated for mobin on 2026-04-10T16:08:59-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mobin'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'   # root Dockerfile; build context is repo root

[env]
  DB_PATH = '/data/mobin.db'
  MAX_SIZE = '65536'
  PORT = '8080'
  TTL_SECS = '2592000'
  WS_PORT = '8081'

[[mounts]]
  source = 'mobin_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[services]]
  protocol = 'tcp'
  internal_port = 8081

  [[services.ports]]
    port = 8081
    handlers = ['tls', 'http']

[[vm]]
  memory = '512mb'    # AOT binary; no JIT compilation at runtime
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
