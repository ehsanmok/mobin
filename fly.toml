# fly.toml app configuration file generated for mobin on 2026-04-10T16:08:59-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mobin'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'   # root Dockerfile; build context is repo root

[env]
  DB_PATH = '/data/mobin.db'
  MAX_SIZE = '65536'
  PORT = '8080'
  TTL_SECS = '2592000'
  WS_PORT = '8081'

[[mounts]]
  source = 'mobin_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

  [[services.http_checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '90s'
    method = 'GET'
    path = '/health'

[[services]]
  protocol = 'tcp'
  internal_port = 8081

  [[services.ports]]
    port = 8081
    handlers = ['tls', 'http']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
