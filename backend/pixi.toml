[workspace]
authors = ["ehsanmok <ehsanmok@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mobin-backend"
platforms = ["linux-64", "osx-arm64", "linux-aarch64"]
version = "0.1.0"
preview = ["pixi-build"]

[dependencies]
mojo             = "<1.0"
flare            = { git = "https://github.com/ehsanmok/flare.git",  branch = "main" }
json             = { git = "https://github.com/ehsanmok/json.git",   branch = "main" }
morph            = { git = "https://github.com/ehsanmok/morph.git",  branch = "main" }
sqlite           = { git = "https://github.com/ehsanmok/sqlite.git", branch = "main" }
envo             = { git = "https://github.com/ehsanmok/envo.git",   branch = "main" }
uuid             = { git = "https://github.com/ehsanmok/uuid.git",   branch = "main" }
tempo            = { git = "https://github.com/ehsanmok/tempo.git",  branch = "main" }
pprint           = { git = "https://github.com/ehsanmok/pprint.git", branch = "main" }
# System libraries needed by flare (TLS, gzip) FFI layers
openssl          = ">=3.6.1,<4"
ca-certificates  = ">=2025.1.31"
zlib             = ">=1.3.1,<2"

[feature.dev.dependencies]
gxx        = ">=13"
pre-commit = ">=4.2.0,<5"

[activation]
env = { MOJO_FLAGS = "-I ." }

[environments]
default = { features = ["dev"], solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

[tasks]
# Build binary (macOS: dlopen/dlsym are in libc, no -ldl needed)
build     = { cmd = "mojo build $MOJO_FLAGS main.mojo -o mobin-backend" }
# Run (requires prior build)
run       = { cmd = "./mobin-backend", depends-on = ["build"] }
# Run directly with mojo (for development, no binary needed)
run-dev   = { cmd = "mojo run $MOJO_FLAGS main.mojo" }
# Tests
tests      = { cmd = "mojo $MOJO_FLAGS tests/test_models.mojo && mojo $MOJO_FLAGS tests/test_db.mojo && mojo $MOJO_FLAGS tests/test_router.mojo" }
test-models = { cmd = "mojo $MOJO_FLAGS tests/test_models.mojo" }
test-db     = { cmd = "mojo $MOJO_FLAGS tests/test_db.mojo" }
test-router = { cmd = "mojo $MOJO_FLAGS tests/test_router.mojo" }
# Format
format    = { cmd = "mojo format mobin main.mojo tests/" }

[target.linux-64.tasks]
# Linux: dlopen/dlsym live in a separate libdl that must be linked explicitly.
# Use -Xlinker to pass the -ldl flag through mojo build to the system linker.
build = { cmd = "mojo build $MOJO_FLAGS main.mojo -o mobin-backend -Xlinker -ldl" }

[target.linux-aarch64.tasks]
build = { cmd = "mojo build $MOJO_FLAGS main.mojo -o mobin-backend -Xlinker -ldl" }
