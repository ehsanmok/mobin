[workspace]
authors   = ["ehsanmok <ehsanmok@users.noreply.github.com>"]
channels  = ["https://conda.modular.com/max-nightly", "conda-forge"]
name      = "mobin"
platforms = ["linux-64", "osx-arm64", "linux-aarch64"]
version   = "0.1.0"
preview   = ["pixi-build"]

# ── Backend Mojo dependencies ──────────────────────────────────────────────────
[dependencies]
mojo            = "==1.0.0b1"
# NOTE: flare uses a local path dep until v0.7.1 ships with a recipe.yaml
# whose ``run: mojo == ...`` pin matches the rest of the v0.1.2 ecosystem
# (currently v0.7.0's recipe pins ``==1.0.0b1.dev2026042717`` while
# json/morph/sqlite/tempo/uuid/envo/pprint pin ``==1.0.0b1`` clean — the
# two strict pins cannot be co-satisfied by the conda solver). Once flare
# publishes v0.7.1 with the recipe bump, swap this back to a git+tag dep.
flare           = { path = "../flare" }
json            = { git = "https://github.com/ehsanmok/json.git",   tag = "v0.1.6" }
morph           = { git = "https://github.com/ehsanmok/morph.git",  tag = "v0.1.2" }
sqlite          = { git = "https://github.com/ehsanmok/sqlite.git", tag = "v0.1.2" }
envo            = { git = "https://github.com/ehsanmok/envo.git",   tag = "v0.1.2" }
uuid            = { git = "https://github.com/ehsanmok/uuid.git",   tag = "v0.1.2" }
tempo           = { git = "https://github.com/ehsanmok/tempo.git",  tag = "v0.1.2" }
pprint          = { git = "https://github.com/ehsanmok/pprint.git", tag = "v0.1.2" }
openssl         = ">=3.6.1,<4"
ca-certificates = ">=2025.1.31"
zlib            = ">=1.3.1,<2"

[feature.dev.dependencies]
gxx        = ">=13"
pre-commit = ">=4.2.0,<5"

# MOJO_FLAGS: backend/ is the cwd for all backend tasks, so -I . resolves to
# backend/ which contains the mobin/ package.
[activation]
env = { MOJO_FLAGS = "-I ." }
# flare v0.7 ships its FFI bridges (libflare_tls.so, libflare_zlib.so,
# libflare_fs.so) as source-built shared libraries. The upstream
# ``flare/pixi.toml`` runs ``flare/tls/ffi/build.sh`` and
# ``flare/http/ffi/build.sh`` on activation so they are present
# whenever someone develops *inside* the flare repo. When mobin pulls
# flare via pixi-build (path or git source) only the ``.mojopkg`` lands
# in ``$CONDA_PREFIX/lib/mojo/`` — the .so files never make it out of
# the build-work cache, and the backend aborts at startup with
# ``symbol not found: flare_read`` (the reactor's hot-path wrapper
# around ``read(2)``/``write(2)`` exposed by libflare_tls.so).
# ``scripts/build_flare_ffi.sh`` finds the latest flare build-work
# tree, sources the upstream build scripts, and copies the freshly
# built .so files into ``$CONDA_PREFIX/lib/`` where
# ``flare.net.socket._find_flare_lib`` can resolve them at runtime.
# Idempotent (skips when up to date) and silent on first-run install
# before the cache is populated.
scripts = ["scripts/build_flare_ffi.sh"]

[environments]
default = { features = ["dev"], solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

# ── Backend tasks (all run inside backend/) ────────────────────────────────────
[tasks]
# Primary serve task used by entrypoint.sh and Fly.io
serve     = { cmd = "mojo run $MOJO_FLAGS main.mojo", cwd = "backend" }
run-dev   = { cmd = "mojo run $MOJO_FLAGS main.mojo", cwd = "backend" }
build     = { cmd = "mojo build $MOJO_FLAGS main.mojo -o mobin-backend", cwd = "backend" }
run       = { cmd = "./mobin-backend", cwd = "backend", depends-on = ["build"] }
format    = { cmd = "mojo format mobin main.mojo tests/", cwd = "backend" }
tests     = { cmd = "mojo $MOJO_FLAGS tests/test_models.mojo && mojo $MOJO_FLAGS tests/test_db.mojo && mojo $MOJO_FLAGS tests/test_router.mojo", cwd = "backend" }
test-models = { cmd = "mojo $MOJO_FLAGS tests/test_models.mojo", cwd = "backend" }
test-db     = { cmd = "mojo $MOJO_FLAGS tests/test_db.mojo",     cwd = "backend" }
test-router = { cmd = "mojo $MOJO_FLAGS tests/test_router.mojo", cwd = "backend" }

# ── Frontend tasks ─────────────────────────────────────────────────────────────
# Serve the full-featured frontend locally (requires the backend to be running).
[tasks.serve-frontend]
cmd = "python3 -m http.server 3001"
cwd = "frontend/src"

# ── Linux overrides (requires explicit -ldl for dlopen/dlsym) ─────────────────
[target.linux-64.tasks]
build = { cmd = "mojo build $MOJO_FLAGS main.mojo -o mobin-backend -Xlinker -ldl", cwd = "backend" }

[target.linux-aarch64.tasks]
build = { cmd = "mojo build $MOJO_FLAGS main.mojo -o mobin-backend -Xlinker -ldl", cwd = "backend" }
