[workspace]
channels = ["conda-forge"]
name = "mobin-integtest"
platforms = ["linux-64", "osx-arm64", "linux-aarch64"]
version = "0.1.0"

[dependencies]
python  = ">=3.11,<4"
pytest  = ">=8.0,<9"
httpx   = ">=0.27,<1"
# websockets for WS integration tests
websockets = ">=13,<14"
# Locust for load testing
locust  = ">=2.31,<3"

[tasks]
# Functional tests against a backend the conftest spins up automatically
# (test_api.py + test_health.py + scenarios/). Skips test_frontend.py
# which requires the full docker-compose stack (nginx on :3000).
test = { cmd = "pytest test_api.py test_health.py scenarios -v" }
# Smoke tests only — fast subset that exercises the v0.7 surface
# (Cors, RequestId, multi-worker HTTP, WS feed) without the broader
# CRUD coverage in test_api.py.
test-smoke = { cmd = "pytest scenarios -v" }
# Full sweep including the docker-compose-only frontend tests (will
# fail unless ``docker compose up`` is running with the frontend
# service on :3000).
test-all = { cmd = "pytest . -v" }

# Load test: headless mode, 50 concurrent users, 10/s spawn rate, 60s run
load-test = { cmd = "locust --headless -u 50 -r 5 --host http://localhost:8080 --run-time 60s -f locustfile.py" }

# Load test with web UI on :8089
# MOBIN_HOST is injected by docker-compose or the Dockerfile ENV.
# Pixi (deno_task_shell) supports simple $VAR expansion; task env provides the default.
load-ui = { cmd = "locust --host $MOBIN_HOST -f locustfile.py --web-port 8089 --web-host 0.0.0.0", env = { MOBIN_HOST = "http://localhost:8080" } }
